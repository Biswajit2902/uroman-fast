name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: macos-latest
            target: x86_64
            manylinux: ""
          - os: macos-latest
            target: universal2-apple-darwin
            manylinux: ""
          - os: windows-latest
            target: x64
            manylinux: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --sdist --compatibility pypi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC); safe to include for token auth too
    # environment: pypi  # Uncomment for trusted publishing; configure at pypi.org
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        env:
          # Option A: Trusted publishing (recommended) - configure at https://pypi.org/manage/project/uroman-fast/settings/publishing/
          # Add this repo as trusted publisher, then remove MATURIN_PYPI_TOKEN
          #
          # Option B: API token - add PYPI_API_TOKEN to repo secrets
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          working-directory: dist
          args: --skip-existing *
